<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <script>(function(){try{var s=localStorage.getItem('theme'),d=window.matchMedia('(prefers-color-scheme: dark)').matches;s==='dark'||s!=='light'&&d?document.documentElement.dataset.theme='dark':document.documentElement.dataset.theme='light'}catch(e){}})();</script>
    <title>Mock оплата — PayTutor Demo</title>
    <meta name="robots" content="noindex,nofollow">
    <meta name="description" content="Тестовый симулятор оплаты PayTutor. Не использует реальные карты и секреты.">
    <link rel="stylesheet" href="/styles.css">
</head>
<body class="mock-pay-page">
<button type="button" class="theme-toggle theme-toggle-floating" aria-label="Переключить тему">
    <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
</button>
<header class="mock-header">
    <span class="mock-badge-page">ТЕСТОВЫЙ РЕЖИМ · NOINDEX</span>
    <h1>Симулятор FreedomPay</h1>
</header>
<main class="mock-main" id="app">
    <!-- Контент заполняется JS -->
</main>
<footer>
    <p>© 2026 PayTutor Demo — без реальных платежей и webhook</p>
</footer>
<script>
(function () {
    var params = new URLSearchParams(window.location.search);
    var orderId = params.get('pg_order_id') || 'demo_order';
    var amount = params.get('pg_amount') || '100000';
    var description = params.get('pg_description') || 'Demo';
    var formatted = Number(amount).toLocaleString('ru-RU');
    var botUrl = 'https://t.me/PayTutorDemoBot';

    function renderForm() {
        document.getElementById('app').innerHTML =
            '<section class="mock-card">' +
            '<h2>Страница оплаты (mock)</h2>' +
            '<p><strong>Заказ:</strong> ' + esc(orderId) + '</p>' +
            '<p><strong>Назначение:</strong> ' + esc(description) + '</p>' +
            '<p class="mock-amount">К оплате: <strong>' + esc(formatted) + ' UZS</strong></p>' +
            '<p class="mock-disclaimer">Демо‑стенд: реальные карты не используются. Webhook и секреты не задействованы.</p>' +
            '<button type="button" class="btn mock-btn-pay" id="btnPay">Оплатить (имитация успеха)</button>' +
            '<button type="button" class="btn mock-btn-cancel" id="btnCancel">Отменить (имитация ошибки)</button>' +
            '</section>';
        document.getElementById('btnPay').onclick = function () { renderResult(true); };
        document.getElementById('btnCancel').onclick = function () { renderResult(false); };
    }

    function renderResult(success) {
        if (success) {
            setTimeout(function () { window.location.href = botUrl; }, 3500);
        }
        document.getElementById('app').innerHTML =
            '<section class="mock-card ' + (success ? 'mock-success' : 'mock-error') + '">' +
            (success
                ? '<h2>✅ Оплата прошла успешно</h2><p>Демо: в реальном сценарии бот отправил бы подтверждение в Telegram.</p>'
                : '<h2>❌ Оплата не выполнена</h2><p>Попробуйте снова в боте.</p>') +
            '<p class="mock-meta"><strong>Заказ:</strong> ' + esc(orderId) + '<br><strong>Сумма:</strong> ' + esc(formatted) + ' UZS</p>' +
            '<a class="btn btn-secondary" href="' + botUrl + '">Открыть чат с ботом</a>' +
            '</section>';
    }

    function esc(s) {
        var d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    renderForm();
})();
</script>
<script src="/theme.js" defer></script>
</body>
</html>
